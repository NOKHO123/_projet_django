<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Blog Django</title>

    <!-- Charger les fichiers statiques -->
    {% load static %}

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Style simple si pas de CSS */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #f39c12;
        }

        .container {
            padding: 20px;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <!--  NAVBAR -->
    <nav>
        <a href="{% url 'article_list' %}">Accueil</a>
        <a href="{% url 'article_create' %}">Créer un article</a>
        <a href="/admin/">Admin</a>
        
    </nav>

    <!--  CONTENU -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!--  FOOTER -->
    <footer>
        <p>© 2026 - Mon Blog Django | Projet Master</p>
    </footer>

</body>
</html>
